!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiMatch - Encuentra Servicios en tu Zona</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="body2">

    <header class="header">
    <div class="container">
        <div class="navbar">
            <div class="nav-brand">
                <span>ServiMatch</span>
            </div>
            
            <div class="nav-menu-container">
                
                
                <nav class="nav-menu" id="navMenu">
                    <a href="index.html">Explorar</a>
                    <a href="#">Cómo funciona</a>
                    <a href="soporte.html">Soporte</a>
                </nav>
                
            </div>

            <div class="nav-actions">
                <a href="login.html">Iniciar Sesión</a>
                <button class="btn btn-primary">Publicar mi Negocio</button>
            </div>}
            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
        </div>
    </div>
</header>

    <main class="container login-main">
        <div class="login-card">
            <div class="login-header">
                <h2>Únete a ServiMatch</h2>
                <p>Crea tu cuenta para comenzar a interactuar en la plataforma</p>
            </div>

            <form action="#" method="POST" class="support-form">
                
                <div class="form-group">
                    <label>¿Cómo deseas usar la plataforma?</label>
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="rol" value="cliente" checked>
                            <div class="role-box">
                                <span class="role-icon">👤</span>
                                <div class="role-text">
                                    <strong>Cliente</strong>
                                    <p>Quiero buscar y adquirir servicios</p>
                                </div>
                            </div>
                        </label>
                        
                        <label class="role-option">
                            <input type="radio" name="rol" value="administrador">
                            <div class="role-box">
                                <span class="role-icon">💼</span>
                                <div class="role-text">
                                    <strong>Negocio</strong>
                                    <p>Quiero publicar servicios y productos</p>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label Territories for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Carlos Angel" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" minlength="8" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="terminos" required>
                        <span class="checkmark"></span>
                        Acepto los <a href="#" class="form-link-sm">Términos y Condiciones</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Crear mi Cuenta</button>
            </form>

            <div class="login-footer">
                <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ServiMatch. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');

        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            menuToggle.classList.toggle('open');
        });
    </script>
</body>
</html>
